<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tab Limiter Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <p class="eyebrow">Settings</p>
        <h1>Configure Tab Limiter</h1>
        <p class="muted">Choose how many tabs can stay open before the extension closes extras.</p>

        <form id="settingsForm" class="form">
          <label class="field">
            <span>Maximum number of tabs</span>
            <input id="maxTabs" name="maxTabs" type="number" min="1" max="200" required />
          </label>

          <label class="checkbox">
            <input id="exemptPinnedTabs" name="exemptPinnedTabs" type="checkbox" />
            <span>Do not count pinned tabs toward the limit</span>
          </label>

          <label class="checkbox">
            <input id="closeNewestTab" name="closeNewestTab" type="checkbox" />
            <span>Close the newest tab first when the limit is exceeded</span>
          </label>

          <label class="checkbox">
            <input id="notifyInConsole" name="notifyInConsole" type="checkbox" />
            <span>Write limit actions to the browser extension console</span>
          </label>

          <div class="actions">
            <button class="button" type="submit">Save settings</button>
            <span id="status" class="muted" aria-live="polite"></span>
          </div>
        </form>
      </section>
    </main>
    <script src="options.js"></script>
  </body>
  </html>
