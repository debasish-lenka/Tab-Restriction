<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tab Limiter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="popup">
    <main class="card">
      <p class="eyebrow">Tab Limiter</p>
      <h1>Stay under your tab cap</h1>
      <p id="summary" class="muted">Loading current tab usage...</p>
      <div class="stats">
        <div>
          <span class="label">Open tabs</span>
          <strong id="openTabs">0</strong>
        </div>
        <div>
          <span class="label">Limit</span>
          <strong id="maxTabs">0</strong>
        </div>
      </div>
      <a class="button" href="options.html" target="_blank" rel="noreferrer">Open settings</a>
    </main>
    <script src="popup.js"></script>
  </body>
  </html>
